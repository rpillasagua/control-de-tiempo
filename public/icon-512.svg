<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)"/>
  
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    
    <linearGradient id="dropGradient" x1="256" y1="80" x2="256" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra de la gota -->
  <ellipse cx="256" cy="440" rx="120" ry="20" fill="#000000" opacity="0.15"/>
  
  <!-- Gota principal -->
  <path 
    d="M256 80C256 80 140 230 140 310C140 393.03 206.97 460 290 460C373.03 460 440 393.03 440 310C440 230 256 80 256 80Z" 
    fill="url(#dropGradient)"
  />
  
  <!-- Estructura cristalina interna -->
  <path 
    d="M256 120L160 300L256 420L352 300L256 120Z" 
    fill="white" 
    opacity="0.4"
  />
  
  <!-- Reflejo/brillo -->
  <path 
    d="M256 120L190 270L256 360L256 120Z" 
    fill="white" 
    opacity="0.6"
  />
  
  <!-- Detalle de copo de nieve/hielo -->
  <g opacity="0.8">
    <line x1="256" y1="250" x2="256" y2="350" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="206" y1="300" x2="306" y2="300" stroke="white" stroke-width="12" stroke-linecap="round"/>
  </g>
  
  <!-- Gotas pequeñas decorativas -->
  <circle cx="320" cy="180" r="8" fill="white" opacity="0.6"/>
  <circle cx="340" cy="220" r="6" fill="white" opacity="0.5"/>
</svg>