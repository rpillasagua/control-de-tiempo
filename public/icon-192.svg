<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <rect width="192" height="192" rx="42" fill="url(#bgGradient)"/>
  
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    
    <linearGradient id="dropGradient" x1="96" y1="30" x2="96" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra de la gota -->
  <ellipse cx="96" cy="162" rx="45" ry="8" fill="#000000" opacity="0.15"/>
  
  <!-- Gota principal -->
  <path 
    d="M96 30C96 30 52 86 52 116C52 147.61 77.39 173 109 173C140.61 173 166 147.61 166 116C166 86 96 30 96 30Z" 
    fill="url(#dropGradient)"
  />
  
  <!-- Estructura cristalina interna -->
  <path 
    d="M96 45L60 112L96 157L132 112L96 45Z" 
    fill="white" 
    opacity="0.4"
  />
  
  <!-- Reflejo/brillo -->
  <path 
    d="M96 45L71 101L96 135L96 45Z" 
    fill="white" 
    opacity="0.6"
  />
  
  <!-- Detalle de copo de nieve/hielo -->
  <g opacity="0.8">
    <line x1="96" y1="94" x2="96" y2="131" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="77" y1="112.5" x2="115" y2="112.5" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  
  <!-- Gotas pequeñas decorativas -->
  <circle cx="120" cy="67" r="3" fill="white" opacity="0.6"/>
  <circle cx="127" cy="82" r="2.2" fill="white" opacity="0.5"/>
</svg>